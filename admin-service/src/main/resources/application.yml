server:
  port: 8085

spring:
  application:
    name: admin-service
  datasource:
    url: jdbc:mysql://127.0.0.1:3306/alert_center?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
    username: root
    password: root
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
  redis:
    host: 127.0.0.1
    port: 6379
  cache:
    type: redis
  cloud:
    nacos:
      username: nacos
      password: nacos
      discovery:
        server-addr: 127.0.0.1:8848
        service: admin-service-http
      config:
        server-addr: 127.0.0.1:8848
        file-extension: yaml

security:
  jwt:
    secret: ChangeThisSecretToAtLeast32Bytes!!
    expire-minutes: 120

dubbo:
  application:
    name: admin-service
    qos-port: 22225
    qos-accept-foreign-ip: false
  protocol:
    name: dubbo
    port: ${DUBBO_PROTOCOL_PORT:-1}
  registry:
    address: nacos://127.0.0.1:8848
    parameters:
      username: nacos
      password: nacos