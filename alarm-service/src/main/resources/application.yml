server:
  port: 8081

spring:
  application:
    name: alarm-service
  redis:
    host: 127.0.0.1
    port: 6379
  cache:
    type: redis
  cloud:
    nacos:
      username: nacos
      password: nacos
      discovery:
        server-addr: 127.0.0.1:8848
      config:
        server-addr: 127.0.0.1:8848
        file-extension: yaml

rocketmq:
  name-server: 127.0.0.1:9876
  producer:
    group: alarm-producer-group

dubbo:
  application:
    name: alarm-service
    qos-port: 22223
    qos-accept-foreign-ip: false
  protocol:
    name: dubbo
    port: -1
  registry:
    address: nacos://127.0.0.1:8848
    parameters:
      username: nacos
      password: nacos
