server:
  port: 8084

spring:
  application:
    name: device-profile-service
  cloud:
    nacos:
      username: nacos
      password: nacos
      discovery:
        server-addr: 127.0.0.1:8848
      config:
        server-addr: 127.0.0.1:8848
        file-extension: yaml

dubbo:
  application:
    name: device-profile-service
    qos-port: 22222
    qos-accept-foreign-ip: false
  protocol:
    name: dubbo
    port: 20880
  registry:
    address: nacos://127.0.0.1:8848
    parameters:
      username: nacos
      password: nacos
