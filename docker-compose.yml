services:
  mysql:
    image: mysql:8.0
    container_name: alert-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: alert_center
      TZ: Asia/Shanghai
    ports:
      - "3306:3306"
    command:
      - --default-authentication-plugin=mysql_native_password
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 30

  redis:
    image: redis:7.2
    container_name: alert-redis
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 30

  nacos:
    image: nacos/nacos-server
    container_name: alert-nacos
    environment:
      MODE: standalone
      PREFER_HOST_MODE: hostname
      NACOS_AUTH_ENABLE: "false"
      NACOS_AUTH_IDENTITY_KEY: "nacos"
      NACOS_AUTH_IDENTITY_VALUE: "nacos"
      NACOS_AUTH_TOKEN: "YWxlcnQtY2VudGVyLW5hY29zLWF1dGgtMjAyNi0wNC0wOQ=="
      JVM_XMS: 256m
      JVM_XMX: 256m
      JVM_XMN: 128m
    ports:
      - "8848:8848"
      - "9848:9848"
      - "9849:9849"

  rocketmq-namesrv:
    image: apache/rocketmq
    platform: linux/amd64
    container_name: alert-rocketmq-namesrv
    command: ["sh", "mqnamesrv"]
    ports:
      - "9876:9876"

  rocketmq-broker:
    image: apache/rocketmq
    platform: linux/amd64
    container_name: alert-rocketmq-broker
    command: ["sh", "mqbroker", "-n", "rocketmq-namesrv:9876", "-c", "/home/rocketmq/rocketmq-5.3.1/conf/broker.conf"]
    depends_on:
      - rocketmq-namesrv
    ports:
      - "10911:10911"
      - "10909:10909"
    volumes:
      - ./docker/rocketmq/broker.conf:/home/rocketmq/rocketmq-5.3.1/conf/broker.conf

volumes:
  mysql_data:
  redis_data:
